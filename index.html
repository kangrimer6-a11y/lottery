<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>복권 시뮬레이터</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#090a0e;--bg2:#111318;--border:#222536;--text:#e8e6f0;--muted:#7a7890;--cyan:#1ab8c4;--gold:#c8920a;}
body{font-family:'IBM Plex Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* PIN */
#pin-overlay{position:fixed;inset:0;background:#090a0e;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;}
#pin-overlay.hidden{display:none;}
.pin-logo{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;color:#1ab8c4;margin-bottom:4px;letter-spacing:2px;}
.pin-sub{font-size:10px;color:#7a7890;letter-spacing:3px;margin-bottom:32px;}
.pin-dots{display:flex;gap:12px;margin-bottom:24px;}
.pin-dot{width:12px;height:12px;border-radius:50%;border:1.5px solid #3e3d58;background:transparent;transition:all .15s;}
.pin-dot.filled{background:#1ab8c4;border-color:#1ab8c4;box-shadow:0 0 6px #1ab8c4;}
.pin-dot.error{background:#d63030;border-color:#d63030;}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:180px;}
.pin-key{padding:14px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;cursor:pointer;background:#111318;border:1px solid #222536;color:#e8e6f0;transition:all .12s;user-select:none;}
.pin-key:hover{background:#181b22;border-color:#3e3d58;}
.pin-key:active{background:#222536;transform:scale(.96);}
.pin-key.del{font-size:12px;color:#7a7890;}
.pin-err{font-size:10px;color:#d63030;margin-top:14px;min-height:14px;letter-spacing:1px;}

/* 앱 탭 */
.app-bar{display:flex;background:#060709;border-bottom:2px solid var(--border);flex-shrink:0;}
.app-btn{flex:1;padding:12px 8px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;transition:all .15s;line-height:1.4;}
.app-btn.on[data-app="lotto"]{color:var(--cyan);border-bottom-color:var(--cyan);background:rgba(26,184,196,.05);}
.app-btn.on[data-app="annuity"]{color:var(--gold);border-bottom-color:var(--gold);background:rgba(200,146,10,.05);}

/* iframe */
.frame-wrap{flex:1;position:relative;overflow:hidden;}
iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:none;}
iframe.on{display:block;}
</style>
</head>
<body>

<!-- 비번 -->
<div id="pin-overlay">
  <div class="pin-logo">VENUS SIM</div>
  <div class="pin-sub">LOTTO &amp; PENSION · DRAW SYSTEM</div>
  <div class="pin-dots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-pad">
    <div class="pin-key" onclick="pinKey('1')">1</div>
    <div class="pin-key" onclick="pinKey('2')">2</div>
    <div class="pin-key" onclick="pinKey('3')">3</div>
    <div class="pin-key" onclick="pinKey('4')">4</div>
    <div class="pin-key" onclick="pinKey('5')">5</div>
    <div class="pin-key" onclick="pinKey('6')">6</div>
    <div class="pin-key" onclick="pinKey('7')">7</div>
    <div class="pin-key" onclick="pinKey('8')">8</div>
    <div class="pin-key" onclick="pinKey('9')">9</div>
    <div class="pin-key del" onclick="pinDel()">⌫</div>
    <div class="pin-key" onclick="pinKey('0')">0</div>
    <div class="pin-key del" onclick="pinClear()">C</div>
  </div>
  <div class="pin-err" id="pin-err"></div>
</div>

<!-- 탭 -->
<div class="app-bar">
  <div class="app-btn on" data-app="lotto" onclick="switchApp('lotto',this)">
    🎱 로또 6/45<br><span style="font-size:9px;font-weight:400;opacity:.7;">비너스 추첨기</span>
  </div>
  <div class="app-btn" data-app="annuity" onclick="switchApp('annuity',this)">
    💰 연금복권 720+<br><span style="font-size:9px;font-weight:400;opacity:.7;">토파즈 추첨기</span>
  </div>
</div>

<!-- iframe -->
<div class="frame-wrap">
  <iframe id="f-lotto"   class="on"  src="lotto.html"></iframe>
  <iframe id="f-annuity"             src="annuity.html"></iframe>
</div>

<script>
const PIN = '1234';
let buf = '';

function pinKey(k){
  if(buf.length >= 4) return;
  buf += k;
  updateDots();
  if(buf.length === 4) setTimeout(checkPin, 120);
}
function pinDel(){ buf = buf.slice(0,-1); updateDots(); }
function pinClear(){ buf = ''; updateDots(); }

function updateDots(){
  for(let i=0;i<4;i++){
    const d = document.getElementById('pd'+i);
    d.classList.toggle('filled', i < buf.length);
    d.classList.remove('error');
  }
}

function checkPin(){
  if(buf === PIN){
    document.getElementById('pin-overlay').classList.add('hidden');
  } else {
    for(let i=0;i<4;i++) document.getElementById('pd'+i).classList.add('error');
    document.getElementById('pin-err').textContent = '비밀번호가 틀렸습니다';
    setTimeout(()=>{ buf=''; updateDots(); document.getElementById('pin-err').textContent=''; }, 800);
  }
}

function switchApp(name, el){
  document.querySelectorAll('.app-btn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('iframe').forEach(f=>f.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('f-'+name).classList.add('on');
}
</script>
</body>
</html>
